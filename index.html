<!DOCTYPE html>
<html lang="pt-BR" data-theme="">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f1923">
<title>Lulu Adventure</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
/* ── TOKENS ─────────────────────────────────────────────────── */
:root {
  --bg:       #0f1923;
  --surface:  #1a2535;
  --card:     #ffffff;
  --border:   #e8edf2;
  --snow:     #f4f7fa;
  --ink:      #0f1923;
  --body:     #3d4f63;
  --muted:    #8fa3b8;
  --accent:   #00b8a0;
  --blue:     #1a7fd4;
  --amber:    #f0a500;
  --red:      #e5432a;
  --purple:   #7c5cbf;
  --font:     'Segoe UI', system-ui, -apple-system, sans-serif;
  --r:        12px;
  --r-sm:     8px;
  --shadow:   0 1px 8px rgba(15,25,35,.08);
  --shadow-md:0 4px 20px rgba(15,25,35,.13);
}
[data-theme="dark"] {
  --card:   #1e2d40;
  --border: #2a3d54;
  --snow:   #162030;
  --ink:    #e8f0f8;
  --body:   #9ab5cc;
  --muted:  #5a7a94;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:var(--font);background:var(--snow);color:var(--ink);overflow:hidden;}

/* ── SHELL ───────────────────────────────────────────────────── */
#shell{display:flex;flex-direction:column;height:100vh;}

/* ── COVER ───────────────────────────────────────────────────── */
#trip-cover{
  display:none;height:80px;flex-shrink:0;
  background-size:cover;background-position:center;
  position:relative;
}
#trip-cover::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom, rgba(15,25,35,.2), rgba(15,25,35,.7));
}

/* ── TOPBAR ──────────────────────────────────────────────────── */
#topbar{
  background:var(--bg);color:#fff;
  display:flex;align-items:center;gap:.6rem;
  padding:0 .85rem;height:52px;flex-shrink:0;
}
.brand{display:flex;align-items:center;gap:.5rem;flex:1;min-width:0;}
.brand-icon{font-size:1.2rem;}
.brand-name{font-size:.93rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.brand-sub{font-size:.65rem;color:var(--muted);white-space:nowrap;}
.topbar-btn{
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
  color:#fff;border-radius:20px;padding:.28rem .7rem;
  font-size:.72rem;font-weight:700;cursor:pointer;white-space:nowrap;
  display:flex;align-items:center;gap:.3rem;transition:background .15s;
}
.topbar-btn:hover{background:rgba(255,255,255,.16);}
.topbar-btn.connected{border-color:var(--accent);color:var(--accent);}

/* ── SUMMARY BAR ─────────────────────────────────────────────── */
#summary-bar{
  display:none;
  background:var(--bg);
  border-top:1px solid rgba(255,255,255,.06);
  flex-shrink:0;padding:.35rem .85rem;
  align-items:center;gap:0;
}
.sum-item{
  flex:1;text-align:center;cursor:pointer;padding:.2rem .3rem;
  border-radius:6px;transition:background .15s;
}
.sum-item:hover{background:rgba(255,255,255,.06);}
.sum-val{font-size:.95rem;font-weight:800;color:#fff;line-height:1.1;}
.sum-lbl{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:1px;}
.sum-div{width:1px;height:28px;background:rgba(255,255,255,.1);flex-shrink:0;}

/* ── TABS ────────────────────────────────────────────────────── */
#tabs{
  background:var(--bg);border-top:1px solid rgba(255,255,255,.06);
  display:flex;flex-shrink:0;overflow-x:auto;scrollbar-width:none;
}
#tabs::-webkit-scrollbar{display:none;}
#tabs button{
  flex:1;min-width:52px;background:none;border:none;color:var(--muted);
  padding:.55rem .3rem .4rem;
  font-size:.6rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;
  border-bottom:2.5px solid transparent;transition:color .15s,border-color .15s;
}
#tabs button .ti{font-size:1rem;}
#tabs button.on{color:#fff;border-bottom-color:var(--accent);}
#tabs button:hover:not(.on){color:rgba(255,255,255,.65);}

/* ── PANELS ──────────────────────────────────────────────────── */
.pnl{display:none;flex:1;overflow-y:auto;flex-direction:column;}
.pnl.on{display:flex;}
#pnl-map.on{flex-direction:row;overflow:hidden;}

/* ── MAP SIDEBAR ─────────────────────────────────────────────── */
#map-side{
  width:265px;min-width:200px;
  background:var(--card);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
#map-main{flex:1;position:relative;}
#lmap{width:100%;height:100%;}

.side-hdr{
  padding:.65rem .9rem .5rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:var(--card);
}
.side-hdr h2{font-size:.68rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.btn-icon{
  background:var(--accent);color:#fff;border:none;
  width:24px;height:24px;border-radius:50%;font-size:.95rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
}

#days-list{flex:1;overflow-y:auto;padding:.25rem 0;}
.map-empty{padding:1.5rem 1rem;text-align:center;color:var(--muted);font-size:.78rem;line-height:1.5;}

.day-row{
  padding:.5rem .9rem;cursor:pointer;
  border-left:3px solid transparent;
  display:flex;align-items:center;gap:.55rem;
  transition:background .1s,border-color .1s;
}
.day-row:hover{background:var(--snow);}
.day-row.on{background:color-mix(in srgb, var(--accent) 8%, var(--card));border-left-color:var(--accent);}
.day-num{
  width:22px;height:22px;border-radius:50%;
  color:#fff;font-size:.65rem;font-weight:800;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.day-info{flex:1;min-width:0;}
.dr-date{font-size:.62rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);}
.dr-title{font-size:.83rem;font-weight:600;color:var(--ink);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dr-loc{font-size:.7rem;color:var(--body);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.day-del{opacity:0;transition:opacity .15s;}
.day-row:hover .day-del{opacity:1;}

/* ── CONTENT PANELS ──────────────────────────────────────────── */
.pad{padding:.85rem;}
.sec{
  font-size:.62rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);padding:.55rem 0 .3rem;
  border-bottom:1px solid var(--border);margin-bottom:.45rem;
}
.mt{margin-top:.75rem;}

/* ── CARDS ───────────────────────────────────────────────────── */
.card{
  background:var(--card);border-radius:var(--r);
  box-shadow:var(--shadow);margin-bottom:.55rem;overflow:hidden;
}

/* ── RESERVAS ────────────────────────────────────────────────── */
.res-card{
  display:flex;gap:.7rem;align-items:flex-start;
  padding:.8rem 1rem;position:relative;
  border-left:4px solid var(--blue);
}
.res-card.hotel{border-left-color:var(--blue);}
.res-card.voo  {border-left-color:var(--accent);}
.res-card.passe{border-left-color:var(--amber);}
.res-card.outro{border-left-color:var(--muted);}
.res-ico{font-size:1.3rem;margin-top:1px;}
.res-info{flex:1;min-width:0;}
.res-title{font-size:.88rem;font-weight:700;color:var(--ink);}
.res-det{font-size:.74rem;color:var(--body);margin-top:2px;}
.res-dates{font-size:.68rem;color:var(--muted);margin-top:3px;}
.res-obs{font-size:.7rem;color:var(--body);margin-top:3px;font-style:italic;}
.badge{font-size:.58rem;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:2px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.badge-ok    {background:#d4f7ee;color:#0a7a5a;}
.badge-pend  {background:#fff3d4;color:#8a6200;}
.badge-cancel{background:#fde8e4;color:#9b2a10;}

/* ── DESPESAS ────────────────────────────────────────────────── */
.budget-wrap{
  background:var(--card);border-radius:var(--r);
  box-shadow:var(--shadow);padding:.85rem 1rem;margin-bottom:.5rem;
}
.bud-top{display:flex;justify-content:space-between;margin-bottom:.45rem;}
.bud-total{font-size:.8rem;font-weight:700;color:var(--ink);}
.bud-used{font-size:.76rem;color:var(--body);}
.bud-bar{background:var(--border);border-radius:99px;height:6px;overflow:hidden;}
.bud-fill{height:100%;border-radius:99px;background:var(--accent);transition:width .4s;}
.bud-fill.over{background:var(--red);}
.bud-chips{display:flex;gap:.35rem;flex-wrap:wrap;margin-top:.6rem;}
.chip{padding:2px 7px;border-radius:20px;font-size:.65rem;font-weight:700;}

.desp-row{
  background:var(--card);border-radius:var(--r-sm);
  box-shadow:var(--shadow);
  display:flex;align-items:center;gap:.65rem;
  padding:.6rem .85rem;margin-bottom:.4rem;
}
.desp-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.desp-name{font-size:.84rem;font-weight:600;color:var(--ink);}
.desp-meta{font-size:.68rem;color:var(--muted);}
.desp-val{font-size:.9rem;font-weight:700;color:var(--ink);white-space:nowrap;}

/* ── CHECKLIST ───────────────────────────────────────────────── */
.cl-group{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:.6rem;overflow:hidden;}
.cl-hdr{
  padding:.65rem 1rem;display:flex;align-items:center;justify-content:space-between;
  background:var(--surface);color:#fff;cursor:pointer;user-select:none;
}
.cl-hdr span{font-size:.8rem;font-weight:700;}
.cl-prog{font-size:.68rem;color:var(--muted);}
.cl-pbar{height:3px;background:rgba(255,255,255,.15);}
.cl-pbar-fill{height:100%;background:var(--accent);transition:width .3s;}
.cl-items{padding:.15rem 0;}
.cl-row{
  display:flex;align-items:center;gap:.65rem;
  padding:.48rem 1rem;border-bottom:1px solid var(--snow);transition:background .1s;
}
.cl-row:last-child{border-bottom:none;}
.cl-row:hover{background:var(--snow);}
.cl-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;}
.cl-row label{flex:1;font-size:.83rem;color:var(--ink);cursor:pointer;}
.cl-row.done label{text-decoration:line-through;color:var(--muted);}
.cl-add-row{padding:.35rem .85rem .55rem;display:flex;gap:.4rem;}

/* ── NOTAS ───────────────────────────────────────────────────── */
.nota-card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:.6rem;overflow:hidden;}
.nota-hdr{
  padding:.6rem 1rem;
  background:linear-gradient(135deg,var(--surface),#2a3f5c);
  color:#fff;display:flex;align-items:center;justify-content:space-between;
}
.nota-hdr-info .nd{font-size:.84rem;font-weight:700;}
.nota-hdr-info .ndate{font-size:.67rem;color:var(--muted);margin-top:1px;}
.nota-body{padding:.7rem 1rem;}
.nota-txt{font-size:.83rem;color:var(--body);line-height:1.55;white-space:pre-wrap;}
.nota-fotos{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.55rem;}
.nf-img{width:60px;height:60px;object-fit:cover;border-radius:6px;cursor:pointer;transition:transform .15s;}
.nf-img:hover{transform:scale(1.05);}
.nf-add{
  width:60px;height:60px;border-radius:6px;
  border:2px dashed var(--border);background:var(--snow);
  display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;color:var(--muted);cursor:pointer;
}

/* ── GEO SUGGESTIONS ─────────────────────────────────────────── */
.geo-item{
  padding:.5rem .75rem;cursor:pointer;font-size:.8rem;color:var(--ink);
  display:flex;align-items:center;gap:.5rem;
  border-bottom:1px solid var(--border);transition:background .1s;
}
.geo-item:last-child{border-bottom:none;}
.geo-item:hover{background:var(--snow);}
.geo-icon{font-size:.95rem;flex-shrink:0;}

/* ── MODAL ───────────────────────────────────────────────────── */
#modal-bg{
  display:none;position:fixed;inset:0;
  background:rgba(15,25,35,.65);z-index:500;
  align-items:flex-end;justify-content:center;
}
#modal-bg.on{display:flex;}
@media(min-width:520px){#modal-bg{align-items:center;padding:1rem;}}
.modal{
  background:var(--card);width:100%;max-width:460px;
  border-radius:var(--r) var(--r) 0 0;
  max-height:92vh;display:flex;flex-direction:column;overflow:hidden;
}
@media(min-width:520px){.modal{border-radius:var(--r);max-height:88vh;}}
.modal-hdr{
  padding:.9rem 1.2rem .7rem;background:var(--bg);color:#fff;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.modal-hdr h3{font-size:.93rem;font-weight:700;}
.modal-x{background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;line-height:1;}
.modal-x:hover{color:#fff;}
.modal-body{padding:.95rem 1.2rem;overflow-y:auto;flex:1;}
.modal-foot{padding:.7rem 1.2rem;border-top:1px solid var(--border);display:flex;gap:.5rem;justify-content:flex-end;flex-shrink:0;}

/* ── FORMS ───────────────────────────────────────────────────── */
.fg{margin-bottom:.75rem;}
.fg label{display:block;font-size:.65rem;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:.26rem;}
.fg input,.fg select,.fg textarea{
  width:100%;padding:.5rem .7rem;
  border:1.5px solid var(--border);border-radius:var(--r-sm);
  font-size:.86rem;color:var(--ink);font-family:inherit;
  background:var(--snow);outline:none;transition:border-color .15s,background .15s;
}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent);background:var(--card);}
.fg textarea{resize:vertical;}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;}

/* ── BUTTONS ─────────────────────────────────────────────────── */
.btn{border:none;border-radius:var(--r-sm);font-family:inherit;cursor:pointer;font-weight:700;transition:opacity .15s;}
.btn:active{opacity:.8;}
.btn-primary{background:var(--accent);color:#fff;padding:.55rem 1.1rem;font-size:.84rem;}
.btn-ghost{background:var(--snow);color:var(--body);padding:.52rem .95rem;font-size:.82rem;border:1.5px solid var(--border);}
.btn-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.82rem;padding:2px 4px;border-radius:4px;}
.btn-del:hover{color:var(--red);background:#fde8e4;}

/* ── TRIP SELECTOR ───────────────────────────────────────────── */
.trip-opt{
  display:flex;align-items:center;gap:.7rem;
  padding:.7rem .9rem;border-radius:var(--r-sm);
  border:1.5px solid var(--border);margin-bottom:.45rem;cursor:pointer;
  transition:border-color .15s,background .15s;
}
.trip-opt:hover,.trip-opt.on{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 6%,var(--card));}
.to-icon{font-size:1.4rem;}
.to-name{font-size:.87rem;font-weight:700;color:var(--ink);}
.to-dates{font-size:.7rem;color:var(--muted);}

/* ── FAB ─────────────────────────────────────────────────────── */
#fab{
  position:fixed;bottom:1.1rem;right:1.1rem;
  width:50px;height:50px;border-radius:50%;
  background:var(--accent);color:#fff;
  border:none;font-size:1.4rem;cursor:pointer;
  box-shadow:0 4px 18px rgba(0,184,160,.4);
  display:flex;align-items:center;justify-content:center;
  z-index:200;transition:transform .15s,box-shadow .15s;
}
#fab:hover{transform:scale(1.05);box-shadow:0 6px 24px rgba(0,184,160,.5);}
#fab:active{transform:scale(.93);}

/* ── LIGHTBOX ────────────────────────────────────────────────── */
#lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:900;align-items:center;justify-content:center;}
#lb.on{display:flex;}
#lb img{max-width:96vw;max-height:90vh;border-radius:8px;}
#lb-x{position:absolute;top:1rem;right:1rem;background:none;border:none;color:#fff;font-size:1.7rem;cursor:pointer;}

/* ── TOAST ───────────────────────────────────────────────────── */
#toast{
  position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);
  background:var(--bg);color:#fff;padding:.38rem .95rem;
  border-radius:20px;font-size:.76rem;z-index:800;
  box-shadow:0 4px 16px rgba(0,0,0,.3);pointer-events:none;
  opacity:0;transition:opacity .2s;white-space:nowrap;
}
</style>
</head>
<body>
<div id="shell">

  <!-- COVER PHOTO -->
  <div id="trip-cover"></div>

  <!-- TOPBAR -->
  <div id="topbar">
    <div class="brand">
      <span class="brand-icon">🌍</span>
      <div>
        <div class="brand-name" id="trip-title">Lulu Adventure</div>
        <div class="brand-sub" id="trip-sub">Nenhuma viagem selecionada</div>
      </div>
    </div>
    <button class="topbar-btn" onclick="openModal('trips')">✈️ Viagens</button>
    <button class="topbar-btn" id="btn-dark" onclick="applyDark(!_darkMode)">🌙</button>
    <button class="topbar-btn" id="btn-drive" onclick="driveAction()">
      <span id="drive-ico">☁️</span> Drive
    </button>
  </div>

  <!-- SUMMARY BAR -->
  <div id="summary-bar"></div>

  <!-- TABS -->
  <nav id="tabs">
    <button class="on" data-tab="map"> <span class="ti">🗺️</span>Mapa</button>
    <button data-tab="res">            <span class="ti">🏨</span>Reservas</button>
    <button data-tab="desp">           <span class="ti">💰</span>Despesas</button>
    <button data-tab="docs">           <span class="ti">✅</span>Docs</button>
    <button data-tab="notas">          <span class="ti">📝</span>Notas</button>
  </nav>

  <!-- MAP -->
  <div id="pnl-map" class="pnl on">
    <div id="map-side">
      <div class="side-hdr">
        <h2>Roteiro</h2>
        <button class="btn-icon" onclick="openModal('day')">+</button>
      </div>
      <div id="days-list"></div>
    </div>
    <div id="map-main"><div id="lmap"></div></div>
  </div>

  <!-- RESERVAS -->
  <div id="pnl-res" class="pnl">
    <div class="pad">
      <div class="sec">🏨 Hotéis & Estadias</div><div id="rl-hotel"></div>
      <div class="sec mt">✈️ Voos & Transfers</div><div id="rl-voo"></div>
      <div class="sec mt">🎫 Passeios & Parques</div><div id="rl-passe"></div>
      <div class="sec mt">📋 Outros</div><div id="rl-outro"></div>
      <div style="height:70px"></div>
    </div>
  </div>

  <!-- DESPESAS -->
  <div id="pnl-desp" class="pnl">
    <div class="pad">
      <div id="budget-wrap"></div>
      <div class="sec mt">Lançamentos</div>
      <div id="desp-list"></div>
      <div style="height:70px"></div>
    </div>
  </div>

  <!-- DOCS -->
  <div id="pnl-docs" class="pnl">
    <div class="pad">
      <div id="cl-groups"></div>
      <div style="height:70px"></div>
    </div>
  </div>

  <!-- NOTAS -->
  <div id="pnl-notas" class="pnl">
    <div class="pad">
      <div id="notas-list"></div>
      <div style="height:70px"></div>
    </div>
  </div>

</div>

<!-- FAB -->
<button id="fab" onclick="fabClick()">+</button>

<!-- MODAL -->
<div id="modal-bg">
  <div class="modal">
    <div class="modal-hdr">
      <h3 id="modal-title">—</h3>
      <button class="modal-x" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="modal-ok">Salvar</button>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lb" onclick="this.classList.remove('on')">
  <button id="lb-x" onclick="document.getElementById('lb').classList.remove('on')">✕</button>
  <img id="lb-img" src="" alt="">
</div>

<div id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/store.js"></script>
<script src="js/map.js"></script>
<script src="js/reservas.js"></script>
<script src="js/despesas.js"></script>
<script src="js/docs.js"></script>
<script src="js/notas.js"></script>
<script src="js/drive.js"></script>
<script src="js/app.js"></script>
</body>
</html>
