<!DOCTYPE html>
<html lang="pt-BR" data-theme="">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a1628">
<title>Lulu Adventure</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ─────────────────────────────────────────────────── */
:root {
  --bg:        #0a1628;
  --bg2:       #111f38;
  --surface:   #162240;
  --card:      #ffffff;
  --border:    #e4eaf2;
  --snow:      #f2f6fb;
  --ink:       #0a1628;
  --body:      #3a4f6a;
  --muted:     #8aa0ba;
  --accent:    #00c9ae;
  --accent2:   #0099ff;
  --amber:     #f5a623;
  --red:       #e5432a;
  --purple:    #7c5cbf;
  --font:      'Inter', system-ui, sans-serif;
  --r:         14px;
  --r-sm:      9px;
  --shadow:    0 1px 6px rgba(10,22,40,.07);
  --shadow-md: 0 4px 24px rgba(10,22,40,.14);
  --shadow-lg: 0 12px 48px rgba(10,22,40,.22);
}
[data-theme="dark"] {
  --card:   #162240;
  --border: #1e3057;
  --snow:   #0f1c35;
  --ink:    #dce8f5;
  --body:   #7a9bbf;
  --muted:  #3d5a7a;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:var(--font);background:var(--snow);color:var(--ink);overflow:hidden;}

/* ── SHELL ───────────────────────────────────────────────────── */
#shell{display:flex;flex-direction:column;height:100vh;}

/* ══════════════════════════════════════════════════════════════
   WELCOME SCREEN
══════════════════════════════════════════════════════════════ */
#welcome{
  display:flex;flex-direction:column;
  position:fixed;inset:0;z-index:1000;
  background:var(--bg);
  overflow-y:auto;
}
#welcome.hidden{display:none;}

.wlc-hero{
  position:relative;
  background:linear-gradient(135deg, #0a1628 0%, #0d2347 50%, #0a3060 100%);
  padding:1.2rem 1.5rem;
  overflow:hidden;
  display:flex;align-items:center;gap:1rem;
}
.wlc-hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 20% 50%, rgba(0,201,174,.2) 0%, transparent 60%),
             radial-gradient(ellipse at 80% 30%, rgba(0,153,255,.15) 0%, transparent 55%);
}
.wlc-globe{
  font-size:2.6rem;flex-shrink:0;
  animation:float 4s ease-in-out infinite;
  position:relative;z-index:1;
}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
.wlc-hero-text{position:relative;z-index:1;flex:1;}
.wlc-title{
  font-size:1.55rem;font-weight:900;color:#fff;
  letter-spacing:-.02em;line-height:1.1;
}
.wlc-title span{
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.wlc-sub{
  font-size:.75rem;color:rgba(255,255,255,.5);margin-top:.2rem;
}
.wlc-dots{display:none;}
.wlc-dot{}

.wlc-body{padding:1.5rem 1.25rem;}

.wlc-section-title{
  font-size:.65rem;font-weight:800;letter-spacing:.1em;
  text-transform:uppercase;color:var(--muted);
  margin-bottom:.75rem;
}

/* Trip cards on welcome */
.wlc-trips{display:flex;flex-direction:column;gap:.55rem;margin-bottom:1.25rem;}
.wlc-trip{
  background:var(--bg2);border:1.5px solid rgba(255,255,255,.08);
  border-radius:var(--r);padding:.9rem 1rem;
  display:flex;align-items:center;gap:.85rem;
  cursor:pointer;transition:all .18s;position:relative;overflow:hidden;
}
.wlc-trip::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,rgba(0,201,174,.06),transparent);
  opacity:0;transition:opacity .18s;
}
.wlc-trip:hover{border-color:rgba(0,201,174,.4);transform:translateY(-1px);}
.wlc-trip:hover::before{opacity:1;}
.wlc-trip.active-trip{border-color:var(--accent);background:rgba(0,201,174,.08);}
.wlc-trip-emoji{font-size:1.8rem;flex-shrink:0;}
.wlc-trip-info{flex:1;min-width:0;}
.wlc-trip-name{font-size:.92rem;font-weight:700;color:#fff;}
.wlc-trip-dates{font-size:.72rem;color:var(--muted);margin-top:2px;}
.wlc-trip-stats{
  display:flex;gap:.4rem;margin-top:.4rem;flex-wrap:wrap;
}
.wlc-stat{
  font-size:.62rem;font-weight:700;padding:2px 7px;
  border-radius:20px;background:rgba(255,255,255,.07);color:var(--muted);
}
.wlc-trip-del{
  background:none;border:none;color:rgba(255,255,255,.2);
  cursor:pointer;font-size:.9rem;padding:4px;border-radius:4px;
  transition:color .15s,background .15s;
}
.wlc-trip-del:hover{color:var(--red);background:rgba(229,67,42,.15);}

.wlc-cover{
  width:56px;height:42px;border-radius:8px;
  object-fit:cover;flex-shrink:0;
  border:1.5px solid rgba(255,255,255,.1);
}

.btn-new-trip{
  width:100%;padding:.85rem;border-radius:var(--r);border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-size:.9rem;font-weight:800;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:.5rem;
  box-shadow:0 4px 20px rgba(0,201,174,.35);
  transition:transform .15s,box-shadow .15s;
  font-family:var(--font);
}
.btn-new-trip:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(0,201,174,.45);}
.btn-new-trip:active{transform:scale(.97);}

.wlc-footer{
  text-align:center;padding:1.5rem 1.25rem;
  font-size:.72rem;color:rgba(255,255,255,.25);
}

/* ══════════════════════════════════════════════════════════════
   TOPBAR
══════════════════════════════════════════════════════════════ */
#topbar{
  background:var(--bg);color:#fff;
  display:flex;align-items:center;gap:.5rem;
  padding:0 .85rem;height:54px;flex-shrink:0;
  border-bottom:1px solid rgba(255,255,255,.05);
}
.brand{display:flex;align-items:center;gap:.6rem;flex:1;min-width:0;cursor:pointer;}
.brand:hover .brand-name{color:var(--accent);}
.brand-logo{
  width:32px;height:32px;border-radius:8px;flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;font-size:1rem;
}
.brand-text{min-width:0;}
.brand-name{
  font-size:.92rem;font-weight:800;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;
  transition:color .15s;
}
.brand-sub{font-size:.62rem;color:var(--muted);white-space:nowrap;}
.topbar-btn{
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.8);border-radius:8px;padding:.32rem .65rem;
  font-size:.7rem;font-weight:700;cursor:pointer;white-space:nowrap;
  display:flex;align-items:center;gap:.3rem;transition:all .15s;
  font-family:var(--font);
}
.topbar-btn:hover{background:rgba(255,255,255,.13);color:#fff;}
.topbar-btn.connected{border-color:var(--accent);color:var(--accent);}

/* ── SUMMARY BAR ─────────────────────────────────────────────── */
#summary-bar{
  display:none;background:var(--bg2);
  border-bottom:1px solid rgba(255,255,255,.06);
  flex-shrink:0;padding:.3rem .85rem;
  align-items:center;gap:0;
}
.sum-item{
  flex:1;text-align:center;cursor:pointer;padding:.18rem .3rem;
  border-radius:6px;transition:background .15s;
}
.sum-item:hover{background:rgba(255,255,255,.05);}
.sum-val{font-size:.9rem;font-weight:800;color:#fff;line-height:1.1;}
.sum-lbl{font-size:.55rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:1px;}
.sum-div{width:1px;height:24px;background:rgba(255,255,255,.08);flex-shrink:0;}

/* ── TABS ────────────────────────────────────────────────────── */
#tabs{
  background:var(--bg);border-bottom:1px solid rgba(255,255,255,.05);
  display:flex;flex-shrink:0;overflow-x:auto;scrollbar-width:none;
}
#tabs::-webkit-scrollbar{display:none;}
#tabs button{
  flex:1;min-width:56px;background:none;border:none;color:var(--muted);
  padding:.55rem .3rem .42rem;
  font-size:.58rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;
  border-bottom:2px solid transparent;transition:color .15s,border-color .15s;
  font-family:var(--font);
}
#tabs button .ti{font-size:1rem;line-height:1;}
#tabs button.on{color:#fff;border-bottom-color:var(--accent);}
#tabs button:hover:not(.on){color:rgba(255,255,255,.6);}

/* ── PANELS ──────────────────────────────────────────────────── */
.pnl{display:none;flex:1;overflow-y:auto;flex-direction:column;}
.pnl.on{display:flex;}
#pnl-map.on{flex-direction:row;overflow:hidden;}

/* ── MAP SIDEBAR ─────────────────────────────────────────────── */
#map-side{
  width:280px;min-width:220px;
  background:var(--bg);
  border-right:1px solid rgba(255,255,255,.06);
  display:flex;flex-direction:column;overflow:hidden;
}
#map-main{flex:1;position:relative;}
#lmap{width:100%;height:100%;}

.side-hdr{
  padding:.7rem 1rem .55rem;
  border-bottom:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:space-between;
}
.side-hdr h2{
  font-size:.62rem;font-weight:800;letter-spacing:.1em;
  text-transform:uppercase;color:var(--muted);
}
.btn-icon{
  background:var(--accent);color:var(--bg);border:none;
  width:24px;height:24px;border-radius:6px;font-size:1rem;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:opacity .15s;
}
.btn-icon:hover{opacity:.85;}

.side-trip-banner{
  padding:.6rem 1rem;
  border-bottom:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;gap:.55rem;
  cursor:pointer;transition:background .15s;
}
.side-trip-banner:hover{background:rgba(255,255,255,.04);}
.stb-emoji{font-size:1.2rem;}
.stb-name{font-size:.8rem;font-weight:700;color:#fff;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.stb-change{font-size:.62rem;color:var(--accent);font-weight:700;white-space:nowrap;}

#days-list{flex:1;overflow-y:auto;padding:.3rem 0;}
.map-empty{
  padding:2rem 1rem;text-align:center;color:var(--muted);
  font-size:.78rem;line-height:1.6;
}
.map-empty .me-icon{font-size:2rem;margin-bottom:.5rem;}

.day-row{
  padding:.48rem .95rem;cursor:pointer;
  border-left:3px solid transparent;
  display:flex;align-items:center;gap:.55rem;
  transition:background .12s,border-color .12s;
}
.day-row:hover{background:rgba(255,255,255,.04);}
.day-row.on{
  background:rgba(0,201,174,.08);
  border-left-color:var(--accent);
}
.day-num{
  width:22px;height:22px;border-radius:6px;
  color:#fff;font-size:.65rem;font-weight:800;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.day-info{flex:1;min-width:0;}
.dr-date{font-size:.6rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);}
.dr-title{font-size:.82rem;font-weight:600;color:#fff;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dr-loc{font-size:.68rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.day-del{opacity:0;background:none;border:none;color:var(--muted);cursor:pointer;font-size:.8rem;padding:2px;border-radius:3px;transition:opacity .15s;}
.day-row:hover .day-del{opacity:1;}

/* ── CONTENT AREA ────────────────────────────────────────────── */
.pad{padding:.9rem;}
.sec{
  font-size:.6rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);padding:.5rem 0 .3rem;
  border-bottom:1px solid var(--border);margin-bottom:.45rem;
}
.mt{margin-top:.75rem;}

/* ── CARDS ───────────────────────────────────────────────────── */
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:.5rem;overflow:hidden;}

/* ── RESERVAS ────────────────────────────────────────────────── */
.res-card{
  display:flex;gap:.7rem;align-items:flex-start;
  padding:.8rem 1rem;position:relative;
  border-left:4px solid var(--accent2);
}
.res-card.hotel{border-left-color:var(--accent2);}
.res-card.voo  {border-left-color:var(--accent);}
.res-card.passe{border-left-color:var(--amber);}
.res-card.outro{border-left-color:var(--muted);}
.res-ico{font-size:1.3rem;}
.res-info{flex:1;min-width:0;}
.res-title{font-size:.87rem;font-weight:700;color:var(--ink);}
.res-det{font-size:.73rem;color:var(--body);margin-top:2px;}
.res-dates{font-size:.67rem;color:var(--muted);margin-top:3px;}
.res-obs{font-size:.7rem;color:var(--body);margin-top:3px;font-style:italic;}
.badge{font-size:.58rem;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:2px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.badge-ok    {background:#d4f7ee;color:#0a7a5a;}
.badge-pend  {background:#fff3d4;color:#8a6200;}
.badge-cancel{background:#fde8e4;color:#9b2a10;}

/* ── DESPESAS ────────────────────────────────────────────────── */
.budget-wrap{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:.85rem 1rem;margin-bottom:.5rem;}
.bud-top{display:flex;justify-content:space-between;margin-bottom:.45rem;}
.bud-total{font-size:.8rem;font-weight:700;color:var(--ink);}
.bud-used{font-size:.75rem;color:var(--body);}
.bud-bar{background:var(--border);border-radius:99px;height:6px;overflow:hidden;}
.bud-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s;}
.bud-fill.over{background:var(--red);}
.bud-chips{display:flex;gap:.35rem;flex-wrap:wrap;margin-top:.6rem;}
.chip{padding:2px 7px;border-radius:20px;font-size:.64rem;font-weight:700;}
.desp-row{background:var(--card);border-radius:var(--r-sm);box-shadow:var(--shadow);display:flex;align-items:center;gap:.65rem;padding:.58rem .85rem;margin-bottom:.38rem;}
.desp-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.desp-name{font-size:.83rem;font-weight:600;color:var(--ink);}
.desp-meta{font-size:.67rem;color:var(--muted);}
.desp-val{font-size:.88rem;font-weight:700;color:var(--ink);white-space:nowrap;}

/* ── CHECKLIST ───────────────────────────────────────────────── */
.cl-group{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:.6rem;overflow:hidden;}
.cl-hdr{
  padding:.65rem 1rem;display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(135deg,var(--bg),var(--surface));color:#fff;
  cursor:pointer;user-select:none;
}
.cl-hdr span{font-size:.8rem;font-weight:700;}
.cl-prog{font-size:.67rem;color:var(--muted);}
.cl-pbar{height:2px;background:rgba(255,255,255,.1);}
.cl-pbar-fill{height:100%;background:var(--accent);transition:width .3s;}
.cl-items{padding:.15rem 0;}
.cl-row{display:flex;align-items:center;gap:.65rem;padding:.46rem 1rem;border-bottom:1px solid var(--snow);transition:background .1s;}
.cl-row:last-child{border-bottom:none;}
.cl-row:hover{background:var(--snow);}
.cl-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;}
.cl-row label{flex:1;font-size:.82rem;color:var(--ink);cursor:pointer;}
.cl-row.done label{text-decoration:line-through;color:var(--muted);}
.cl-add-row{padding:.35rem .85rem .5rem;display:flex;gap:.4rem;}

/* ── NOTAS ───────────────────────────────────────────────────── */
.nota-card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:.6rem;overflow:hidden;}
.nota-hdr{
  padding:.6rem 1rem;
  background:linear-gradient(135deg,var(--bg),var(--surface));
  color:#fff;display:flex;align-items:center;justify-content:space-between;
}
.nota-hdr-info .nd{font-size:.83rem;font-weight:700;}
.nota-hdr-info .ndate{font-size:.66rem;color:var(--muted);margin-top:1px;}
.nota-body{padding:.7rem 1rem;}
.nota-txt{font-size:.82rem;color:var(--body);line-height:1.55;white-space:pre-wrap;}
.nota-fotos{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.55rem;}
.nf-img{width:60px;height:60px;object-fit:cover;border-radius:7px;cursor:pointer;transition:transform .15s;}
.nf-img:hover{transform:scale(1.06);}
.nf-add{width:60px;height:60px;border-radius:7px;border:2px dashed var(--border);background:var(--snow);display:flex;align-items:center;justify-content:center;font-size:1.3rem;color:var(--muted);cursor:pointer;}

/* ── GEO SUGGESTIONS ─────────────────────────────────────────── */
.geo-item{
  padding:.5rem .75rem;cursor:pointer;font-size:.8rem;color:var(--ink);
  display:flex;align-items:center;gap:.5rem;
  border-bottom:1px solid var(--border);transition:background .1s;
}
.geo-item:last-child{border-bottom:none;}
.geo-item:hover{background:var(--snow);}
.geo-icon{font-size:.95rem;flex-shrink:0;}

/* ── MODAL ───────────────────────────────────────────────────── */
#modal-bg{
  display:none;position:fixed;inset:0;
  background:rgba(10,22,40,.7);backdrop-filter:blur(4px);z-index:500;
  align-items:flex-end;justify-content:center;
}
#modal-bg.on{display:flex;}
@media(min-width:520px){#modal-bg{align-items:center;padding:1rem;}}
.modal{
  background:var(--card);width:100%;max-width:460px;
  border-radius:var(--r) var(--r) 0 0;
  max-height:92vh;display:flex;flex-direction:column;overflow:hidden;
  box-shadow:var(--shadow-lg);
}
@media(min-width:520px){.modal{border-radius:var(--r);max-height:88vh;}}
.modal-hdr{
  padding:.9rem 1.2rem .7rem;
  background:linear-gradient(135deg,var(--bg),var(--surface));color:#fff;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.modal-hdr h3{font-size:.92rem;font-weight:800;}
.modal-x{background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;line-height:1;}
.modal-x:hover{color:#fff;}
.modal-body{padding:.95rem 1.2rem;overflow-y:auto;flex:1;}
.modal-foot{padding:.7rem 1.2rem;border-top:1px solid var(--border);display:flex;gap:.5rem;justify-content:flex-end;flex-shrink:0;}

/* ── FORMS ───────────────────────────────────────────────────── */
.fg{margin-bottom:.75rem;}
.fg label{display:block;font-size:.63rem;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:.25rem;}
.fg input,.fg select,.fg textarea{
  width:100%;padding:.5rem .7rem;
  border:1.5px solid var(--border);border-radius:var(--r-sm);
  font-size:.85rem;color:var(--ink);font-family:var(--font);
  background:var(--snow);outline:none;transition:border-color .15s,background .15s;
}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent);background:var(--card);}
.fg textarea{resize:vertical;}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;}

/* ── BUTTONS ─────────────────────────────────────────────────── */
.btn{border:none;border-radius:var(--r-sm);font-family:var(--font);cursor:pointer;font-weight:700;transition:opacity .15s;}
.btn:active{opacity:.8;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;padding:.55rem 1.1rem;font-size:.84rem;}
.btn-ghost{background:var(--snow);color:var(--body);padding:.52rem .95rem;font-size:.82rem;border:1.5px solid var(--border);}
.btn-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.82rem;padding:2px 4px;border-radius:4px;}
.btn-del:hover{color:var(--red);background:#fde8e4;}

/* ── FAB ─────────────────────────────────────────────────────── */
#fab{
  position:fixed;bottom:1.1rem;right:1.1rem;
  width:50px;height:50px;border-radius:14px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;
  border:none;font-size:1.4rem;cursor:pointer;
  box-shadow:0 4px 20px rgba(0,201,174,.4);
  display:flex;align-items:center;justify-content:center;
  z-index:200;transition:transform .15s,box-shadow .15s;font-family:var(--font);
}
#fab:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,201,174,.5);}
#fab:active{transform:scale(.93);}

/* ── LIGHTBOX ────────────────────────────────────────────────── */
#lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:900;align-items:center;justify-content:center;}
#lb.on{display:flex;}
#lb img{max-width:96vw;max-height:90vh;border-radius:10px;}
#lb-x{position:absolute;top:1rem;right:1rem;background:none;border:none;color:#fff;font-size:1.7rem;cursor:pointer;}

/* ── TOAST ───────────────────────────────────────────────────── */
#toast{
  position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);
  background:var(--bg);color:#fff;padding:.38rem 1rem;
  border-radius:20px;font-size:.75rem;z-index:800;
  box-shadow:0 4px 16px rgba(0,0,0,.3);pointer-events:none;
  opacity:0;transition:opacity .2s;white-space:nowrap;border:1px solid rgba(255,255,255,.08);
}

/* ── MAP SIDEBAR NEW ─────────────────────────────────────────── */
#map-side{
  width:280px;min-width:220px;
  background:var(--bg);
  border-right:1px solid rgba(255,255,255,.07);
  display:flex;flex-direction:column;overflow:hidden;
}
.side-trip-banner{
  padding:.6rem 1rem;border-bottom:1px solid rgba(255,255,255,.07);
  display:flex;align-items:center;gap:.55rem;
  cursor:pointer;transition:background .15s;flex-shrink:0;
}
.side-trip-banner:hover{background:rgba(255,255,255,.04);}
.stb-emoji{font-size:1.15rem;}
.stb-name{font-size:.8rem;font-weight:700;color:#fff;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.stb-change{font-size:.6rem;color:var(--accent);font-weight:700;white-space:nowrap;}

.side-section{border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;}
.side-section:last-child{border-bottom:none;}
.side-section-hdr{
  padding:.5rem .9rem;display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;user-select:none;
  font-size:.7rem;font-weight:700;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;
  transition:background .12s;
}
.side-section-hdr:hover{background:rgba(255,255,255,.04);}
.side-chevron{font-size:.7rem;transition:transform .2s;}
.side-section-body{overflow:hidden;transition:max-height .25s ease;}
.side-section-body.collapsed{max-height:0!important;}

/* Layer grid */
.layer-grid{display:grid;grid-template-columns:1fr 1fr;gap:.35rem;padding:.5rem .7rem;}
.layer-btn{
  background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.7);border-radius:8px;padding:.45rem .5rem;
  font-size:.72rem;font-weight:700;cursor:pointer;
  display:flex;align-items:center;gap:.35rem;transition:all .15s;font-family:var(--font);
}
.layer-btn:hover{background:rgba(255,255,255,.12);color:#fff;}
.layer-btn.on{background:rgba(0,201,174,.15);border-color:var(--accent);color:var(--accent);}
.layer-ico{font-size:.9rem;}

/* Category rows */
.cat-row{
  padding:.4rem .9rem;display:flex;align-items:center;gap:.5rem;
  cursor:pointer;transition:background .12s;font-size:.78rem;
}
.cat-row:hover{background:rgba(255,255,255,.04);}
.cat-row.hidden-cat{opacity:.4;}
.cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.cat-ico{font-size:.9rem;flex-shrink:0;}
.cat-label{flex:1;color:rgba(255,255,255,.8);font-size:.74rem;font-weight:500;}
.cat-count{font-size:.65rem;background:rgba(255,255,255,.1);color:var(--muted);padding:1px 6px;border-radius:20px;}
.cat-eye{font-size:.6rem;color:var(--muted);width:12px;text-align:center;}

/* Points list */
.map-empty{padding:1.5rem 1rem;text-align:center;color:var(--muted);font-size:.76rem;line-height:1.6;}
.me-icon{font-size:1.8rem;margin-bottom:.4rem;}

.point-row{
  padding:.45rem .9rem;cursor:pointer;
  display:flex;align-items:center;gap:.55rem;
  transition:background .12s;
}
.point-row:hover{background:rgba(255,255,255,.04);}
.point-row.on{background:rgba(0,201,174,.08);}
.point-row.faded{opacity:.35;}
.point-icon-wrap{
  width:30px;height:30px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:.9rem;flex-shrink:0;
}
.point-info{flex:1;min-width:0;}
.point-title{font-size:.8rem;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.point-meta{font-size:.65rem;color:var(--muted);margin-top:1px;}
.point-del{opacity:0;background:none;border:none;color:var(--muted);cursor:pointer;font-size:.78rem;padding:2px;border-radius:3px;transition:opacity .15s;}
.point-row:hover .point-del{opacity:1;}

/* MAP PINS */
.map-pin{
  display:flex;flex-direction:column;align-items:center;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,.4));
  transition:transform .15s;
}
.map-pin:hover{transform:scale(1.15);}
.map-pin-active{transform:scale(1.2);}
.map-pin-inner{
  width:32px;height:32px;border-radius:50% 50% 50% 0;
  transform:rotate(-45deg);
  background:var(--pin-color,#1a7fd4);
  display:flex;align-items:center;justify-content:center;
  border:2.5px solid rgba(255,255,255,.9);
  box-shadow:0 2px 8px rgba(0,0,0,.3);
}
.map-pin-inner span,.map-pin-inner>*{
  transform:rotate(45deg);font-size:.9rem;line-height:1;
}
.map-pin-tail{
  width:2px;height:8px;
  background:var(--pin-color,#1a7fd4);
  margin-top:-1px;
  border-radius:0 0 2px 2px;
}

/* POPUP */
.lulu-popup .leaflet-popup-content-wrapper{
  background:var(--card);border-radius:12px;
  box-shadow:0 8px 32px rgba(0,0,0,.25);padding:0;overflow:hidden;
}
.lulu-popup .leaflet-popup-tip{background:var(--card);}
.lulu-popup .leaflet-popup-content{margin:0;width:220px!important;}
.popup-wrap{font-family:var(--font);}
.popup-hdr{
  padding:.65rem .85rem;display:flex;align-items:center;gap:.5rem;
  background:var(--snow);
}
.popup-ico{font-size:1.2rem;}
.popup-title{font-size:.85rem;font-weight:700;color:var(--ink);}
.popup-cat{font-size:.67rem;color:var(--muted);margin-top:1px;}
.popup-row{font-size:.76rem;color:var(--body);padding:.35rem .85rem;border-top:1px solid var(--border);}
.popup-notes{font-style:italic;color:var(--muted);}
.popup-actions{padding:.5rem .85rem;display:flex;gap:.4rem;border-top:1px solid var(--border);}
.popup-btn{
  flex:1;font-size:.72rem;padding:.35rem .5rem;border-radius:6px;
  border:1px solid var(--border);cursor:pointer;background:var(--snow);
  color:var(--ink);font-family:var(--font);font-weight:600;transition:background .12s;
}
.popup-btn:hover{background:var(--border);}
.popup-btn-del:hover{background:#fde8e4;color:var(--red);border-color:#fcc;}
.popup-btn-edit:hover{background:#e6f2ff;color:var(--accent2);border-color:#bde;}

/* FLOATING TOOLBAR */
#map-toolbar{
  position:absolute;top:1rem;left:50%;transform:translateX(-50%);
  display:flex;gap:.4rem;z-index:400;
  background:rgba(10,22,40,.75);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.12);
  border-radius:20px;padding:.3rem .5rem;
  box-shadow:0 4px 20px rgba(0,0,0,.3);
}
.map-tool-btn{
  background:none;border:none;color:rgba(255,255,255,.7);
  width:32px;height:32px;border-radius:50%;
  font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .15s,color .15s;font-weight:700;
}
.map-tool-btn:hover{background:rgba(255,255,255,.12);color:#fff;}
.map-tool-btn.active{background:rgba(0,201,174,.25);color:var(--accent);}

/* CAT PICKER in modal */
.cat-pick-btn{
  padding:.35rem .6rem;border-radius:20px;border:1.5px solid var(--border);
  font-size:.75rem;cursor:pointer;background:var(--snow);color:var(--body);
  font-family:var(--font);font-weight:600;transition:all .15s;
}
.cat-pick-btn.on{
  background:color-mix(in srgb, var(--cp-color) 15%, var(--snow));
  border-color:var(--cp-color);color:var(--cp-color);
}

</style>
</head>
<body>
<div id="shell">

  <!-- ══ WELCOME SCREEN ══════════════════════════════════════════ -->
  <div id="welcome">
    <div class="wlc-hero">
      <div class="wlc-globe">🌍</div>
      <div class="wlc-hero-text">
        <div class="wlc-title">Lulu <span>Adventure</span></div>
        <div class="wlc-sub">Seu organizador de viagens</div>
      </div>
    </div>

    <div class="wlc-body">
      <div id="wlc-trips-wrap">
        <!-- rendered by JS -->
      </div>
      <button class="btn-new-trip" onclick="openModal('new-trip')">
        + Nova Viagem
      </button>
    </div>

    <div class="wlc-footer">Lulu Adventure · Todos os dados salvos localmente</div>
  </div>

  <!-- ══ APP ═════════════════════════════════════════════════════ -->

  <!-- TOPBAR -->
  <div id="topbar">
    <div class="brand" onclick="showWelcome()">
      <div class="brand-logo">🌍</div>
      <div class="brand-text">
        <div class="brand-name" id="trip-title">Lulu Adventure</div>
        <div class="brand-sub" id="trip-sub">Toque para trocar de viagem</div>
      </div>
    </div>
    <button class="topbar-btn" id="btn-dark" onclick="applyDark(!_darkMode)">🌙</button>
    <button class="topbar-btn" id="btn-drive" onclick="driveAction()">
      <span id="drive-ico">☁️</span> Drive
    </button>
  </div>

  <!-- SUMMARY BAR -->
  <div id="summary-bar"></div>

  <!-- TABS -->
  <nav id="tabs">
    <button class="on" data-tab="map"> <span class="ti">🗺️</span>Mapa</button>
    <button data-tab="res">            <span class="ti">🏨</span>Reservas</button>
    <button data-tab="desp">           <span class="ti">💰</span>Despesas</button>
    <button data-tab="docs">           <span class="ti">✅</span>Docs</button>
    <button data-tab="notas">          <span class="ti">📝</span>Notas</button>
  </nav>

  <!-- MAP -->
  <div id="pnl-map" class="pnl on">

    <!-- LEFT SIDEBAR -->
    <div id="map-side">

      <!-- Trip banner -->
      <div class="side-trip-banner" onclick="showWelcome()">
        <span class="stb-emoji" id="stb-emoji">✈️</span>
        <span class="stb-name" id="stb-name">Selecionar viagem</span>
        <span class="stb-change">trocar →</span>
      </div>

      <!-- Collapsible: Camadas -->
      <div class="side-section">
        <div class="side-section-hdr" onclick="toggleSection('layer-panel')">
          <span>🗺️ Camadas</span>
          <span class="side-chevron">▾</span>
        </div>
        <div id="layer-panel" class="side-section-body layer-grid"></div>
      </div>

      <!-- Collapsible: Categorias -->
      <div class="side-section">
        <div class="side-section-hdr" onclick="toggleSection('cat-panel')">
          <span>🏷️ Categorias</span>
          <span class="side-chevron">▾</span>
        </div>
        <div id="cat-panel" class="side-section-body"></div>
      </div>

      <!-- Points list -->
      <div class="side-section" style="flex:1;display:flex;flex-direction:column;min-height:0">
        <div class="side-section-hdr" style="cursor:default">
          <span>📍 Pontos</span>
          <button class="btn-icon" style="width:20px;height:20px;font-size:.8rem" onclick="enableAddMode()" id="map-add-btn" title="Adicionar ponto">+</button>
        </div>
        <div id="points-list" style="flex:1;overflow-y:auto;padding:.25rem 0"></div>
      </div>

    </div><!-- /map-side -->

    <!-- MAP AREA -->
    <div id="map-main">
      <div id="lmap"></div>

      <!-- Floating toolbar -->
      <div id="map-toolbar">
        <button class="map-tool-btn" onclick="enableAddMode()" id="map-add-btn" title="Adicionar ponto (clique no mapa)">
          <span>＋</span>
        </button>
        <button class="map-tool-btn" onclick="locateMe()" title="Minha localização">
          <span>◎</span>
        </button>
        <button class="map-tool-btn" onclick="fitAllPoints()" title="Ver todos os pontos">
          <span>⊡</span>
        </button>
      </div>
    </div>

  </div>

  <!-- RESERVAS -->
  <div id="pnl-res" class="pnl">
    <div class="pad">
      <div class="sec">🏨 Hotéis & Estadias</div><div id="rl-hotel"></div>
      <div class="sec mt">✈️ Voos & Transfers</div><div id="rl-voo"></div>
      <div class="sec mt">🎫 Passeios & Parques</div><div id="rl-passe"></div>
      <div class="sec mt">📋 Outros</div><div id="rl-outro"></div>
      <div style="height:70px"></div>
    </div>
  </div>

  <!-- DESPESAS -->
  <div id="pnl-desp" class="pnl">
    <div class="pad">
      <div id="budget-wrap"></div>
      <div class="sec mt">Lançamentos</div>
      <div id="desp-list"></div>
      <div style="height:70px"></div>
    </div>
  </div>

  <!-- DOCS -->
  <div id="pnl-docs" class="pnl">
    <div class="pad">
      <div id="cl-groups"></div>
      <div style="height:70px"></div>
    </div>
  </div>

  <!-- NOTAS -->
  <div id="pnl-notas" class="pnl">
    <div class="pad">
      <div id="notas-list"></div>
      <div style="height:70px"></div>
    </div>
  </div>

</div>

<!-- FAB -->
<button id="fab" onclick="fabClick()">+</button>

<!-- MODAL -->
<div id="modal-bg">
  <div class="modal">
    <div class="modal-hdr">
      <h3 id="modal-title">—</h3>
      <button class="modal-x" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="modal-ok">Salvar</button>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lb" onclick="this.classList.remove('on')">
  <button id="lb-x" onclick="document.getElementById('lb').classList.remove('on')">✕</button>
  <img id="lb-img" src="" alt="">
</div>
<div id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/store.js"></script>
<script src="js/map.js"></script>
<script src="js/reservas.js"></script>
<script src="js/despesas.js"></script>
<script src="js/docs.js"></script>
<script src="js/notas.js"></script>
<script src="js/drive.js"></script>
<script src="js/app.js"></script>
</body>
</html>
